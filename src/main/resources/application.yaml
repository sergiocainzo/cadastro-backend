spring:
  application:
    name: cadastro
  # Configuração do DataSource ( Banco )
  datasource:
    url: jdbc:postgresql://postgres:5432/b_usuario
    username: user
    password: user

  # Configuração do Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configuração do Perfil
  profiles:
    active: dev
